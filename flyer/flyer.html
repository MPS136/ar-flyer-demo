<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1350px; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .card {
    position:relative; width:1080px; height:1350px; overflow:hidden;
    background:
      radial-gradient(circle at 18% 22%, rgba(239,163,32,.22), transparent 36%),
      radial-gradient(circle at 82% 75%, rgba(35,90,151,.26), transparent 40%),
      radial-gradient(circle at 55% 50%, rgba(27,63,107,.08), transparent 55%),
      linear-gradient(135deg, #ffffff 0%, #eef3f9 100%);
  }
  /* corner triangles - strong contrasting shapes for AR tracking */
  .corner { position:absolute; width:0; height:0; }
  .c1 { top:0; left:0; border-top:260px solid #235a97; border-right:260px solid transparent; }
  .c2 { bottom:0; right:0; border-bottom:200px solid #efa320; border-left:200px solid transparent; }
  .c3 { top:0; right:0; border-top:120px solid #efa32033; border-left:120px solid transparent; }
  .c4 { bottom:0; left:0; border-bottom:100px solid #235a9733; border-right:100px solid transparent; }

  /* decorative horizontal rule under logo */
  .rule { position:absolute; top:390px; left:60px; right:60px; height:4px;
    background: linear-gradient(90deg, transparent, #235a97 20%, #efa320 80%, transparent); }

  /* logo - horizontal version, 1280x720 aspect */
  .logo { position:absolute; top:52px; left:50%; transform:translateX(-50%); width:600px; }
  .logo img { width:100%; display:block; }

  /* badge sticker */
  .badge {
    position:absolute; top:56px; right:56px; width:136px; height:136px; border-radius:50%;
    background:#efa320; color:#1b3f6b; font-weight:800; font-size:18px; line-height:1.2;
    display:flex; align-items:center; justify-content:center; text-align:center;
    transform:rotate(-12deg);
    box-shadow: 0 6px 24px rgba(239,163,32,.45);
  }

  /* kicker line */
  .kicker {
    position:absolute; top:414px; left:90px; right:90px; text-align:center;
    font-size:22px; letter-spacing:7px; color:#efa320; font-weight:700; text-transform:uppercase;
  }

  /* main headline */
  .title {
    position:absolute; top:456px; left:70px; right:70px; text-align:center;
    font-size:80px; line-height:1.0; font-weight:800; color:#1b3f6b;
  }

  /* sub-headline */
  .sub {
    position:absolute; top:718px; left:100px; right:100px; text-align:center;
    font-size:25px; line-height:1.5; color:#2b3a4a;
  }

  /* second decorative rule */
  .rule2 { position:absolute; top:834px; left:60px; right:60px; height:3px;
    background: linear-gradient(90deg, transparent, #efa320 30%, #235a97 70%, transparent); }

  /* QR box */
  .qrbox {
    position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
    width:430px; padding:24px 24px 18px; background:#fff;
    border:6px solid #235a97; border-radius:28px;
    box-shadow: 0 18px 56px rgba(27,63,107,.28);
    text-align:center;
  }
  .qrbox img { width:340px; height:340px; display:block; margin:0 auto 12px; }
  .qrbox .cta { font-size:22px; font-weight:700; color:#1b3f6b; }
  .qrbox .url { font-size:14px; color:#6b8098; margin-top:4px; }

  /* dot accent grid for tracking texture - spans center zone */
  .dots {
    position:absolute; top:390px; left:0; right:0; height:340px;
    background-image: radial-gradient(circle, #235a971a 2px, transparent 2px);
    background-size: 30px 30px;
    background-position: 15px 15px;
    pointer-events:none;
  }

  /* left accent bar */
  .accent-left {
    position:absolute; top:420px; left:30px; width:8px; height:280px;
    border-radius:4px;
    background: linear-gradient(180deg, #235a97 0%, #efa320 100%);
    opacity: 0.6;
  }
  /* right accent bar */
  .accent-right {
    position:absolute; top:420px; right:30px; width:8px; height:280px;
    border-radius:4px;
    background: linear-gradient(180deg, #efa320 0%, #235a97 100%);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="corner c1"></div>
  <div class="corner c2"></div>
  <div class="corner c3"></div>
  <div class="corner c4"></div>
  <div class="dots"></div>
  <div class="accent-left"></div>
  <div class="accent-right"></div>
  <div class="rule"></div>
  <div class="rule2"></div>

  <div class="logo"><img src="./assets/logo.png" alt="iAcademia" /></div>
  <div class="badge">REALIDAD<br/>AUMENTADA</div>

  <div class="kicker">Demo de realidad aumentada</div>
  <div class="title">Apunta y mira<br/>la marca cobrar vida</div>
  <div class="sub">Escanea el codigo, apunta la camara a este flyer y veras el isotipo de iAcademia en 3D.</div>

  <div class="qrbox">
    <img src="./assets/qr.png" alt="QR" />
    <div class="cta">Escanea para empezar</div>
    <div class="url">mps136.github.io/ar-flyer-demo</div>
  </div>
</div>
</body>
</html>
