<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<script type="module">
import "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js";
window.__mindarReady = true;
</script>
</head>
<body>
<script>
window.compileFromDataUrl = async (dataUrl) => {
  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = dataUrl;
  });
  const compiler = new window.MINDAR.IMAGE.Compiler();
  await compiler.compileImageTargets([img], (p) => { window.__progress = p; });
  const buffer = await compiler.exportData(); // ArrayBuffer
  const bytes = new Uint8Array(buffer);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
};
</script>
</body>
</html>
