<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>iAcademia en tus manos</title>
<link rel="icon" href="../assets/iacademia-isotipo.svg" type="image/svg+xml" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0f1a; font-family: system-ui, sans-serif; }
  #wrap { position:fixed; inset:0; }
  #cam { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(1); }
  #gl { position:absolute; inset:0; width:100%; height:100%; }
  #start { position:absolute; left:50%; bottom:12%; transform:translateX(-50%); z-index:10;
    padding:16px 30px; font-size:18px; font-weight:600; color:#fff; background:#235a97; border:none; border-radius:999px; box-shadow:0 6px 22px rgba(0,0,0,.4); }
  #hint { position:absolute; left:50%; top:7%; transform:translateX(-50%); z-index:10; display:none; color:#cfe0f5; background:rgba(0,0,0,.5); padding:10px 18px; border-radius:999px; font-size:14px; }
  #credit { position:fixed; bottom:20px; left:16px; z-index:10; color:#cfe0f5; font-size:11px; opacity:0.6; max-width:180px; line-height:1.3; }
  #credit a { color:#cfe0f5; text-decoration:underline; pointer-events:auto; }
  #hud { position:fixed; top:64px; left:12px; z-index:11; display:none; color:#9effa0; background:rgba(0,0,0,.6); padding:8px 11px; border-radius:8px; font:13px/1.5 ui-monospace, monospace; white-space:pre; }
  .error { position:absolute; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; color:#fff; background:#0a0f1a; padding:28px; text-align:center; }
</style>
</head>
<body>
<div id="wrap">
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="gl"></canvas>
</div>
<button id="start">Comenzar</button>
<div id="hint">Muestra la palma abierta</div>
<div id="credit">Cerebro 3D: <a href="https://poly.pizza/m/5mPRPZkI3qt">"Brain" by Poly by Google</a> (CC BY 3.0)</div>
<div id="hud"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
import { HandLandmarker, FilesetResolver } from "tasks-vision";
import { addBrandLights, buildLogo, setCameraBackground, makeBloom, enableBloom, buildBrain, ParticleField } from "../shared/premium.js";
import { createBrainAudio } from "../shared/brain-audio.js";

window.__MANOS = { ready: false, handLandmarkerLoaded: false, error: null, brainLoaded: false, particles: 0, synapsePairs: 0, audioReady: false, morph: 0, _force: null };
window.__MANOS.testMorph = (p) => { window.__MANOS._force = p; };
const MIRROR = false; // poner true si se graba con camara frontal en modo espejo

function showError(m){ const d=document.createElement("div"); d.className="error"; d.textContent=m; document.body.appendChild(d); }

let handLandmarker = null;
async function loadHands() {
  const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
    runningMode: "VIDEO", numHands: 1,
  });
  window.__MANOS.handLandmarkerLoaded = true;
}

async function main() {
  try {
    const canvas = document.getElementById("gl");
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    // Tono cinematografico: ACES + exposicion -> contraste y brillos controlados (no fosforito).
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100);
    camera.position.set(0, 0, 0); // camara en el origen mirando -z
    // Entorno HDRI de estudio (PMREM): IMPRESCINDIBLE para que el metal refleje.
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    addBrandLights(scene, { metal: true });
    // Render directo (lienzo transparente sobre el video de la camara): ligero para movil.
    const { pivot, surfacePoints } = await buildLogo("../assets/iacademia-isotipo.svg", { scaleToFit: 1.0, finish: "metal" });
    // pivot ya trae su escala de ajuste (fit) que convierte el SVG (~560u) en ~1u.
    // Las particulas/surfacePoints tambien estan en espacio ~1u. Por eso el holder
    // escala SOLO por baseScale (NO por fit otra vez), o todo el conjunto colapsaria.

    // Holder: posiciona y escala todo el conjunto (logo + particulas + sinapsis + pulsos).
    const COUNT = 4500;
    const holder = new THREE.Group(); scene.add(holder);
    holder.add(pivot); pivot.position.set(0, 0, 0); // el logo se posiciona via holder
    // material del logo transparente para poder desvanecerlo al disolverse
    pivot.traverse((o) => { if (o.isMesh) { o.material.transparent = true; } });

    // Cerebro, campo de particulas y sinapsis
    const brain = await buildBrain("../assets/source/brain.glb", { scaleToFit: 1.0 });
    const field = new ParticleField(surfacePoints(COUNT), { targetB: brain.brainPoints(COUNT), spread: 0.6, size: 0.02, goldRatio: 0.22 });
    field.points.visible = false; holder.add(field.points);
    // sinapsis: lineas azules aditivas + pulsos dorados
    const syn = brain.synapses({ nodes: 260, k: 3 });
    const linePos = new Float32Array(syn.pairs.length * 6);
    syn.pairs.forEach(([a, b], i) => {
      const A = syn.nodes[a], B = syn.nodes[b];
      linePos.set([A.x, A.y, A.z, B.x, B.y, B.z], i * 6);
    });
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute("position", new THREE.BufferAttribute(linePos, 3));
    const lines = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ color: 0x6fc0ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false }));
    lines.visible = false; holder.add(lines);
    // pulsos: un Points dorado que viaja por un subconjunto de aristas
    const PULSE = Math.min(120, syn.pairs.length);
    const pulsePos = new Float32Array(PULSE * 3);
    const pulsePhase = new Float32Array(PULSE);
    const pulseEdge = new Int32Array(PULSE);
    for (let i = 0; i < PULSE; i++) { pulseEdge[i] = (i * 7) % syn.pairs.length; pulsePhase[i] = Math.random(); }
    const pulseGeo = new THREE.BufferGeometry();
    pulseGeo.setAttribute("position", new THREE.BufferAttribute(pulsePos, 3));
    const pulses = new THREE.Points(pulseGeo, new THREE.PointsMaterial({ color: 0xefa320, size: 0.03, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false }));
    pulses.visible = false; holder.add(pulses);
    enableBloom(pivot); // glow selectivo solo sobre el logo (no sobre la camara)
    enableBloom(field.points); enableBloom(lines); enableBloom(pulses);
    const audio = createBrainAudio();

    // Marcar estado de test tras construir todo
    window.__MANOS.brainLoaded = true;
    window.__MANOS.particles = field.count;
    window.__MANOS.synapsePairs = syn.pairs.length;

    const bloom = makeBloom(renderer, scene, camera, { strength: 0.4, radius: 0.5, threshold: 0.2 });
    const clock = new THREE.Clock();
    let cover = null; // fondo = feed de camara (in-render, robusto); se asigna al arrancar

    const video = document.getElementById("cam");
    const hint = document.getElementById("hint");
    // HUD de depuracion (solo con ?debug en la URL): detectada / open / morph / fps.
    const DEBUG = location.search.includes("debug");
    const hud = document.getElementById("hud");
    if (DEBUG) hud.style.display = "block";
    // Escena lista ya. El modelo de manos (pesado) NO bloquea: se carga al pulsar
    // Comenzar, despues de arrancar la camara, para que la camara se vea enseguida.
    window.__MANOS.ready = true;

    // landmarks: 0 muneca, 9 MCP medio, puntas 4/8/12/16/20, MCP 5/9/13/17
    function palmInfo(lm) {
      const wx = lm[0].x, wy = lm[0].y;                 // muneca
      let mx = 0, my = 0; for (const i of [5, 9, 13, 17]) { mx += lm[i].x; my += lm[i].y; } mx /= 4; my /= 4; // nudillos
      // centro = nudillos empujado un poco hacia los dedos: cae en la PALMA, no en la muneca/antebrazo
      const cx = mx + (mx - wx) * 0.12;
      const cy = my + (my - wy) * 0.12;
      const span = Math.hypot(lm[0].x-lm[9].x, lm[0].y-lm[9].y);
      // apertura: media de distancias yema-muneca normalizada por span
      const tips=[8,12,16,20]; let open=0; for(const i of tips){ open+=Math.hypot(lm[i].x-lm[0].x, lm[i].y-lm[0].y); }
      open=(open/tips.length)/(span||1);
      return { cx, cy, span, open };
    }

    let morph = 0;            // suavizado entre frames
    const FIST = 1.2, OPEN = 2.1;
    function place(lm) {
      const { cx, cy, span, open } = palmInfo(lm);
      const nx = (MIRROR ? 1 - cx : cx) * 2 - 1;
      const ny = -(cy * 2 - 1);
      const v = new THREE.Vector3(nx, ny, 0.5).unproject(camera);
      const dir = v.sub(camera.position).normalize();
      holder.position.copy(camera.position).add(dir.multiplyScalar(2.2));
      const baseScale = THREE.MathUtils.clamp(span * 4.0, 0.3, 1.5);
      holder.scale.setScalar(baseScale);
      // objetivo de morph desde la apertura (smoothstep FIST->OPEN)
      const raw = THREE.MathUtils.clamp((open - FIST) / (OPEN - FIST), 0, 1);
      window._morphTarget = raw * raw * (3 - 2 * raw);
      window._lastOpen = open; // para el HUD de depuracion
      holder.visible = true;
    }

    // Hook de test: ejecuta place() con landmarks sinteticos y devuelve la escala
    // resultante y el tamano del logo en el mundo, para detectar colapso de escala
    // (el logo y las particulas deben medir ~baseScale, no ~fitScale).
    window.__MANOS.testHand = (lm) => {
      place(lm);
      holder.updateMatrixWorld(true);
      const s = new THREE.Box3().setFromObject(pivot).getSize(new THREE.Vector3());
      return { holderScale: holder.scale.x, morphTarget: window._morphTarget, logoWorldSize: Math.max(s.x, s.y) };
    };

    let lastMorph = 0;

    function frame() {
      const dt = clock.getDelta();
      const t = clock.elapsedTime;
      let detected = false;
      if (video.readyState >= 2 && handLandmarker) {
        const res = handLandmarker.detectForVideo(video, performance.now());
        if (res.landmarks && res.landmarks.length) { place(res.landmarks[0]); detected = true; hint.style.display = "none"; }
        else { holder.visible = false; hint.style.display = "block"; }
      }
      // morph: override de test si existe, si no el objetivo suavizado de la mano
      const target = (window.__MANOS._force != null) ? window.__MANOS._force : (detected ? (window._morphTarget || 0) : 0);
      morph += (target - morph) * Math.min(1, dt * 6);
      window.__MANOS.morph = morph;
      field.morph(morph);
      // crossfade logo solido <-> particulas
      const showField = morph > 0.02;
      field.points.visible = showField;
      field.points.material.opacity = Math.min(1, morph * 1.4);
      pivot.visible = morph < 0.98;
      pivot.traverse((o) => { if (o.isMesh) o.material.opacity = 1 - Math.min(1, morph * 1.3); });
      if (pivot.visible) pivot.rotation.y += dt * 0.7;
      // sinapsis + pulsos solo con morph alto
      const synK = THREE.MathUtils.clamp((morph - 0.6) / 0.4, 0, 1);
      lines.visible = pulses.visible = synK > 0.001;
      lines.material.opacity = 0.5 * synK;
      pulses.material.opacity = synK;
      if (synK > 0.001) {
        const arr = pulses.geometry.attributes.position.array;
        for (let i = 0; i < PULSE; i++) {
          pulsePhase[i] = (pulsePhase[i] + dt * 0.6) % 1;
          const [a, b] = syn.pairs[pulseEdge[i]];
          const A = syn.nodes[a], B = syn.nodes[b], p = pulsePhase[i];
          arr[i*3] = A.x + (B.x - A.x) * p; arr[i*3+1] = A.y + (B.y - A.y) * p; arr[i*3+2] = A.z + (B.z - A.z) * p;
        }
        pulses.geometry.attributes.position.needsUpdate = true;
      }
      // latido del cerebro
      if (morph > 0.9) field.points.scale.setScalar(1 + 0.03 * Math.sin(t * 3.0));
      else field.points.scale.setScalar(1);
      // sonido: cruces de umbral
      if (lastMorph < 0.5 && morph >= 0.5) audio.whoosh();
      if (lastMorph > 0.05 && morph <= 0.05) audio.chime();
      lastMorph = morph;
      audio.setMorph(morph);
      if (DEBUG) {
        const fps = dt > 0 ? 1 / dt : 0;
        hud.textContent = "detectada: " + (detected ? "SI" : "no") +
          "\nopen:  " + (window._lastOpen || 0).toFixed(2) +
          "\nmorph: " + morph.toFixed(2) +
          "\nfps:   " + fps.toFixed(0);
      }
      if (cover) cover(window.innerWidth, window.innerHeight);
      bloom.render();
      requestAnimationFrame(frame);
    }

    document.getElementById("start").addEventListener("click", async () => {
      document.getElementById("start").style.display = "none";
      // 1) Camara primero: que se vea enseguida (lienzo transparente sobre el video)
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
        await video.play();
        cover = setCameraBackground(scene, video); // camara como fondo de escena (robusto)
        cover(window.innerWidth, window.innerHeight);
      } catch (e) { showError("No se pudo acceder a la camara. Revisa permisos y HTTPS."); return; }
      audio.init();
      window.__MANOS.audioReady = audio.ready;
      hint.textContent = "Cargando deteccion de manos...";
      hint.style.display = "block";
      requestAnimationFrame(frame); // ya renderiza camara + logo (oculto hasta detectar mano)
      // 2) Modelo de manos despues (no bloquea la camara)
      try {
        await loadHands();
        hint.textContent = "Muestra la palma abierta";
      } catch (e) { hint.textContent = "No se pudo cargar la deteccion de manos"; }
    });
  } catch (e) {
    window.__MANOS.error = String(e);
    showError("Error al iniciar: " + (e && e.message ? e.message : e));
  }
}
main();
</script>
</body>
</html>
